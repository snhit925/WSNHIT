<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SNHIT Ludo</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial;
color:white;
}

.card{
width:380px;
padding:30px;
background:#111827;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,136,.3);
}

h1{
color:#00ff88;
font-size:42px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.play{background:#00ff88;}
.room{background:#3b82f6;color:white;}
.join{background:#f59e0b;color:white;}

#roomCode{
display:none;
margin-top:15px;
padding:10px;
background:#222;
border-radius:10px;
}
</style>
</head>

<body>

<div class="card">
<h1>🎲 SNHIT Ludo</h1>

<p>Online Multiplayer Ludo</p>

<button class="play" onclick="play()">Play Offline</button>
<button class="room" onclick="createRoom()">Create Room</button>
<button class="join" onclick="joinRoom()">Join Room</button>

<div id="roomCode"></div>

</div>

<script>

function play(){
alert("Offline Mode Coming Soon");
}

function createRoom(){
const code=Math.floor(100000+Math.random()*900000);

document.getElementById("roomCode").style.display="block";
document.getElementById("roomCode").innerHTML=
"Room Code: <b>"+code+"</b>";
}

function joinRoom(){
let room=prompt("Enter Room Code");

if(room){
alert("Joining Room: "+room);
}
}

</script>

</body>
</html>
