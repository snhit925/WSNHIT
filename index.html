<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNHIT Chat Hub</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#111;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:15px;
}

.chat-box{
  width:100%;
  max-width:500px;
  background:#222;
  border-radius:20px;
  padding:20px;
  border:1px solid #00ff88;
}

h1,h2{
  text-align:center;
  color:#00ff88;
  margin-bottom:20px;
}

#messages{
  height:350px;
  overflow-y:auto;
  background:#111;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.message{
  background:#333;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.mine{
  background:#005f3c;
  margin-left:auto;
  text-align:right;
}

.input-area{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:20px;
  outline:none;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#00ff88;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

#chatBox{ display:none; }
</style>
</head>

<body>

<!-- 🔥 LOGIN SCREEN -->
<div id="loginPage" class="chat-box">
  <h2>Login / Signup</h2>

  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password">

  <button onclick="signup(email.value,password.value)">Sign Up</button>
  <button onclick="login(email.value,password.value)">Login</button>
</div>

<!-- 🔥 CHAT APP -->
<div id="app" class="chat-box" style="display:none;">
  <h1>💬 SNHIT Chat Hub</h1>

  <div id="messages"></div>

  <div class="input-area">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()" style="margin-top:10px;">Logout</button>
</div>

<!-- 🔥 FIREBASE SCRIPT (ONLY ONE CLEAN VERSION) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAGwaIUPulsO721G-3yIDnLzYaKgQpYybY",
  authDomain: "snhit-chat-hub.firebaseapp.com",
  projectId: "snhit-chat-hub",
  storageBucket: "snhit-chat-hub.firebasestorage.app",
  messagingSenderId: "241439945461",
  appId: "1:241439945461:web:95258c72967e4756dd8bbc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = function(email, password){
  signInWithEmailAndPassword(auth,email,password)
  .catch(err => alert(err.message));
}

/* SIGNUP */
window.signup = function(email, password){
  createUserWithEmailAndPassword(auth,email,password)
  .catch(err => alert(err.message));
}

/* LOGOUT */
window.logout = function(){
  signOut(auth);
}

/* AUTO LOGIN UI SWITCH */
onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("loginPage").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

/* CHAT FUNCTION */
window.sendMessage = async function(){
  const input = document.getElementById("messageInput");

  if(!input.value.trim()) return;

  await addDoc(collection(db,"messages"),{
    text: input.value,
    createdAt: serverTimestamp()
  });

  input.value="";
}

/* LOAD MESSAGES */
const q = query(collection(db,"messages"),orderBy("createdAt"));

onSnapshot(q,(snapshot)=>{
  const box = document.getElementById("messages");
  box.innerHTML="";

  snapshot.forEach(doc=>{
    const data = doc.data();
    const div = document.createElement("div");
    div.className="message";
    div.innerText = data.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
