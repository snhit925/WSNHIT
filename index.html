<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SNHIT Ludo</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial;
color:white;
}

.card{
width:380px;
padding:30px;
background:#111827;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,136,.3);
}

h1{color:#00ff88;font-size:42px;}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
text-align:center;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin:8px 0;
border:none;
border-radius:15px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.play{background:#00ff88;}
.room{background:#3b82f6;color:white;}
.join{background:#f59e0b;color:white;}
.login{background:#ff4d6d;color:white;}
.guest{background:#9ca3af;color:white;}

#roomCode{
display:none;
margin-top:15px;
padding:10px;
background:#222;
border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<!-- LOGIN / START SCREEN -->
<div id="startScreen">
<h1>🎲 SNHIT Ludo</h1>
<p>Online Multiplayer Ludo</p>

<button class="login" onclick="login()">Login with Google</button>

<input id="nameInput" placeholder="Or Enter Game Name">

<button class="guest" onclick="guestStart()">Continue as Guest</button>
</div>

<!-- LOBBY SCREEN -->
<div id="lobby" style="display:none;">
<h2>Welcome, <span id="userName"></span></h2>

<button class="play" onclick="play()">🎮 Play Offline</button>
<button class="room" onclick="createRoom()">Create Room</button>
<button class="join" onclick="joinRoom()">Join Room</button>
</div>

<div id="roomCode"></div>

</div>

<script type="module">

// FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDzh_o3laTWFYqpQeMpDY6PsTDXlNhjtnM",
  authDomain: "snhit-ludo.firebaseapp.com",
  projectId: "snhit-ludo",
  storageBucket: "snhit-ludo.firebasestorage.app",
  messagingSenderId: "539128132475",
  appId: "1:539128132475:web:8922b738348ea01046c3de"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let userName = localStorage.getItem("username");

// AUTO LOAD
window.onload = function(){
if(userName){
showLobby();
}
}

// LOGIN GOOGLE
window.login = async function(){
try {
const result = await signInWithPopup(auth, provider);
userName = result.user.displayName;
localStorage.setItem("username", userName);
showLobby();
} catch (e) {
alert("Login Failed");
}
}

// GUEST MODE
window.guestStart = function(){
let name = document.getElementById("nameInput").value;

if(!name){
alert("Enter Game Name");
return;
}

userName = name;
localStorage.setItem("username", userName);
showLobby();
}

// SHOW LOBBY
function showLobby(){
document.getElementById("startScreen").style.display="none";
document.getElementById("lobby").style.display="block";
document.getElementById("userName").innerText = userName;
}

// OFFLINE GAME
window.play = function(){
alert("🎮 Offline Game Starting...");
}

// CREATE ROOM
window.createRoom = function(){
const code = Math.floor(100000 + Math.random()*900000);

document.getElementById("roomCode").style.display = "block";
document.getElementById("roomCode").innerHTML =
"Room Code: <b>" + code + "</b>";
}

// JOIN ROOM
window.joinRoom = function(){
let room = prompt("Enter Room Code");

if(room){
alert("Joining Room: " + room);
}
}

</script>

</body>
</html>
