<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNHIT Chat Hub</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#111;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      padding:15px;
    }

    .chat-box{
      width:100%;
      max-width:500px;
      background:#222;
      border-radius:20px;
      padding:20px;
      border:1px solid #00ff88;
    }

    h1{
      text-align:center;
      color:#00ff88;
      margin-bottom:20px;
    }

    #messages{
      height:350px;
      overflow-y:auto;
      background:#111;
      padding:15px;
      border-radius:15px;
      margin-bottom:15px;
    }

    .message{
      background:#333;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .input-area{
      display:flex;
      gap:10px;
    }

    input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:20px;
      outline:none;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:20px;
      background:#00ff88;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <div class="chat-box">
    <h1>💬 SNHIT Chat Hub</h1>

    <div id="messages"></div>

    <div class="input-area">
      <input id="messageInput" placeholder="Type a message...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAGwaIUPulsO721G-3yIDnLzYaKgQpYybY",
      authDomain: "snhit-chat-hub.firebaseapp.com",
      projectId: "snhit-chat-hub",
      storageBucket: "snhit-chat-hub.firebasestorage.app",
      messagingSenderId: "241439945461",
      appId: "1:241439945461:web:95258c72967e4756dd8bbc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const messages = document.getElementById("messages");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    sendBtn.addEventListener("click", async () => {

      if(input.value.trim() === "") return;

      await addDoc(collection(db, "messages"), {
        text: input.value,
        createdAt: serverTimestamp()
      });

      input.value = "";
    });

    const q = query(
      collection(db, "messages"),
      orderBy("createdAt")
    );

    onSnapshot(q, (snapshot) => {

      messages.innerHTML = "";

      snapshot.forEach((doc) => {

        const div = document.createElement("div");

        div.className = "message";
        div.innerText = doc.data().text;

        messages.appendChild(div);
      });

      messages.scrollTop = messages.scrollHeight;
    });

  </script>

</body>
</html>
