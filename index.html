<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNHIT Chat</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#111;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .chat-box{
      width:95%;
      max-width:450px;
      background:#222;
      border-radius:15px;
      padding:20px;
      border:1px solid #00ff88;
    }

    h1{
      text-align:center;
      color:#00ff88;
      margin-bottom:20px;
    }

    #messages{
      height:350px;
      overflow-y:auto;
      background:#111;
      padding:10px;
      border-radius:10px;
      margin-bottom:15px;
    }

    .message{
      background:#333;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .input-area{
      display:flex;
      gap:10px;
    }

    input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:20px;
      outline:none;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:20px;
      background:#00ff88;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>

  <div class="chat-box">
    <h1>💬 SNHIT Chat</h1>

    <div id="messages"></div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

</body>
</html>
