<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNHIT Chat Hub</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0d0d0d;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:15px;
}

/* LOGIN */
.chat-box{
  width:100%;
  max-width:500px;
  background:#1c1c1c;
  border-radius:20px;
  padding:20px;
  border:1px solid #00ff88;
}

h1,h2{
  text-align:center;
  color:#00ff88;
  margin-bottom:20px;
}

/* CHAT BOX */
#messages{
  height:400px;
  overflow-y:auto;
  background:#111;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE STYLE (INSTAGRAM LIKE) */
.message{
  max-width:70%;
  padding:10px 12px;
  border-radius:15px;
  font-size:14px;
  word-break:break-word;
}

/* OTHERS */
.left{
  background:#2c2c2c;
  align-self:flex-start;
}

/* YOU */
.right{
  background:#00ff88;
  color:#000;
  align-self:flex-end;
}

/* USERNAME */
.name{
  font-size:11px;
  opacity:0.7;
  margin-bottom:3px;
}

.input-area{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:20px;
  outline:none;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#00ff88;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

#app{ display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="chat-box">
  <h2>Login / Signup</h2>

  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password">
  <input id="username" placeholder="Enter Username">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="app" class="chat-box">
  <h1>💬 SNHIT Chat Hub</h1>

  <div id="messages"></div>

  <div class="input-area">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>

  <button onclick="logout()" style="margin-top:10px;">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAGwaIUPulsO721G-3yIDnLzYaKgQpYybY",
  authDomain: "snhit-chat-hub.firebaseapp.com",
  projectId: "snhit-chat-hub",
  storageBucket: "snhit-chat-hub.firebasestorage.app",
  messagingSenderId: "241439945461",
  appId: "1:241439945461:web:95258c72967e4756dd8bbc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function(){
  const email = email.value;
  const password = password.value;

  await signInWithEmailAndPassword(auth,email,password);
}

/* SIGNUP */
window.signup = async function(){
  const email = email.value;
  const password = password.value;
  const username = document.getElementById("username").value;

  await createUserWithEmailAndPassword(auth,email,password);
  localStorage.setItem("username",username);
}

/* LOGOUT */
window.logout = function(){
  signOut(auth);
}

/* UI SWITCH */
onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("loginPage").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

/* SEND MESSAGE */
window.sendMessage = async function(){
  const text = document.getElementById("messageInput").value;
  if(!text.trim()) return;

  const username = localStorage.getItem("username") || "Anonymous";

  await addDoc(collection(db,"messages"),{
    text,
    name: username,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  document.getElementById("messageInput").value="";
}

/* LOAD MESSAGES */
const q = query(collection(db,"messages"),orderBy("createdAt"));

onSnapshot(q,(snapshot)=>{
  const box = document.getElementById("messages");
  box.innerHTML="";

  snapshot.forEach(doc=>{
    const data = doc.data();

    const div = document.createElement("div");

    const isMe = auth.currentUser && data.uid === auth.currentUser.uid;

    div.className = "message " + (isMe ? "right" : "left");

    div.innerHTML = `
      <div class="name">${data.name || "Anonymous"}</div>
      <div>${data.text}</div>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
